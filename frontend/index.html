<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三弓床弩弹射动力学仿真与穿甲威力分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e4e4e7;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 22px;
            color: #ffd700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .header .status {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }

        .status-dot.offline {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            grid-template-rows: 1fr 300px;
            gap: 16px;
            padding: 16px;
            height: calc(100vh - 65px);
        }

        .canvas-panel {
            grid-column: 1;
            grid-row: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        #three-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .canvas-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.8;
            border-left: 3px solid #ffd700;
        }

        .canvas-overlay h3 {
            color: #ffd700;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .canvas-controls {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 16px;
            border-radius: 8px;
        }

        .btn {
            padding: 8px 18px;
            background: linear-gradient(135deg, #b8860b, #ffd700);
            color: #1a1a2e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #374151, #4b5563);
            color: #e4e4e7;
        }

        .btn-secondary:hover {
            box-shadow: 0 4px 12px rgba(107, 114, 128, 0.4);
        }

        .data-panel {
            grid-column: 2;
            grid-row: 1 / 3;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-title {
            font-size: 16px;
            color: #ffd700;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 4px;
        }

        .sensor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .sensor-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sensor-label {
            font-size: 11px;
            color: #9ca3af;
            margin-bottom: 4px;
        }

        .sensor-value {
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
            font-family: 'Consolas', monospace;
        }

        .sensor-unit {
            font-size: 12px;
            color: #9ca3af;
            margin-left: 4px;
        }

        .sensor-value.warning {
            color: #f59e0b;
        }

        .sensor-value.danger {
            color: #ef4444;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: #e4e4e7;
            font-size: 13px;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #ffd700;
        }

        .trajectory-panel {
            grid-column: 1;
            grid-row: 2;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            padding: 16px;
        }

        #trajectory-canvas {
            width: 100%;
            height: calc(100% - 30px);
            display: block;
        }

        .armor-compare {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .armor-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .armor-name {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        .armor-result {
            font-size: 16px;
            font-weight: bold;
        }

        .armor-result.success {
            color: #22c55e;
        }

        .armor-result.fail {
            color: #ef4444;
        }

        .alerts-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .alert-item {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-item.warning {
            background: rgba(245, 158, 11, 0.15);
            border-left: 3px solid #f59e0b;
        }

        .alert-item.critical {
            background: rgba(239, 68, 68, 0.15);
            border-left: 3px solid #ef4444;
        }

        .alert-icon {
            font-size: 14px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.3);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏹 三弓床弩弹射动力学仿真与穿甲威力分析系统</h1>
        <div class="status">
            <div class="status-item">
                <div class="status-dot" id="db-status"></div>
                <span>数据库</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="mqtt-status"></div>
                <span>MQTT</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="sensor-status"></div>
                <span>传感器</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="canvas-panel">
            <canvas id="three-canvas"></canvas>
            <div class="canvas-overlay">
                <h3>三弓床弩三维模型</h3>
                <div>宋代重型床弩，三弓复合结构</div>
                <div>最大射程：约 1500 米</div>
                <div>箭矢初速：约 100-140 m/s</div>
            </div>
            <div class="canvas-controls">
                <button class="btn" id="btn-shoot">🏹 模拟发射</button>
                <button class="btn btn-secondary" id="btn-reset">重置视角</button>
                <button class="btn btn-secondary" id="btn-animate">弓弦演示</button>
            </div>
        </div>

        <div class="trajectory-panel">
            <div class="panel-title">弹道轨迹仿真</div>
            <canvas id="trajectory-canvas"></canvas>
        </div>

        <div class="data-panel">
            <div>
                <div class="panel-title">实时传感器数据</div>
                <div class="sensor-grid">
                    <div class="sensor-card">
                        <div class="sensor-label">弓弦拉力</div>
                        <div><span class="sensor-value" id="val-tension">0</span><span class="sensor-unit">N</span></div>
                    </div>
                    <div class="sensor-card">
                        <div class="sensor-label">弩臂变形</div>
                        <div><span class="sensor-value" id="val-deformation">0</span><span class="sensor-unit">mm</span></div>
                    </div>
                    <div class="sensor-card">
                        <div class="sensor-label">箭矢初速</div>
                        <div><span class="sensor-value" id="val-velocity">0</span><span class="sensor-unit">m/s</span></div>
                    </div>
                    <div class="sensor-card">
                        <div class="sensor-label">穿甲深度</div>
                        <div><span class="sensor-value" id="val-penetration">0</span><span class="sensor-unit">mm</span></div>
                    </div>
                </div>
            </div>

            <div>
                <div class="panel-title">仿真参数设置</div>
                <div class="form-group">
                    <label>箭矢初速 (m/s)</label>
                    <input type="number" id="param-velocity" value="120" min="30" max="200">
                </div>
                <div class="form-group">
                    <label>发射角度 (°)</label>
                    <input type="number" id="param-angle" value="45" min="0" max="89" step="1">
                </div>
                <div class="form-group">
                    <label>铠甲类型</label>
                    <select id="param-armor">
                        <option value="leather">皮甲</option>
                        <option value="chainmail">锁子甲</option>
                        <option value="plate" selected>板甲</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>箭镞类型</label>
                    <select id="param-arrow">
                        <option value="bodkin" selected>穿甲箭镞</option>
                        <option value="broadhead">宽刃箭镞</option>
                        <option value="blunt">钝头箭镞</option>
                    </select>
                </div>
            </div>

            <div>
                <div class="panel-title">穿甲威力对比</div>
                <div class="armor-compare" id="armor-compare">
                    <div class="armor-item">
                        <div class="armor-name">皮甲</div>
                        <div class="armor-result success" id="armor-leather">--</div>
                    </div>
                    <div class="armor-item">
                        <div class="armor-name">锁子甲</div>
                        <div class="armor-result" id="armor-chainmail">--</div>
                    </div>
                    <div class="armor-item">
                        <div class="armor-name">板甲</div>
                        <div class="armor-result fail" id="armor-plate">--</div>
                    </div>
                </div>
            </div>

            <div>
                <div class="panel-title">告警信息</div>
                <div class="alerts-container" id="alerts-container">
                    <div style="color: #6b7280; font-size: 12px; text-align: center; padding: 20px;">暂无告警</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="app.js"></script>
</body>
</html>
